<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shardex AI</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:95%;
    max-width:500px;
    height:90vh;
    background:#1a1a1a;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,140,0,0.3);
}

.header{
    background:linear-gradient(45deg,#ff7b00,#ffae00);
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
    color:white;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:15px;
    max-width:75%;
    word-wrap:break-word;
}

.user{
    background:#ff7b00;
    color:white;
    align-self:flex-end;
    margin-left:auto;
}

.bot{
    background:#333;
    color:white;
    align-self:flex-start;
}

.input-area{
    display:flex;
    padding:10px;
    background:#222;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
    outline:none;
    font-size:15px;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#ff7b00;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff9500;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">🔥 Shardex AI</div>
    <div class="chat-box" id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage(){
    let input = document.getElementById("input");
    let message = input.value.trim();
    if(message === "") return;

    addMessage(message, "user");
    input.value = "";

    setTimeout(()=>{
        let reply = getReply(message.toLowerCase());
        addMessage(reply, "bot");
    },500);
}

function addMessage(text, type){
    let chat = document.getElementById("chat");
    let msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function getReply(msg){
    if(msg.includes("hello") || msg.includes("hi"))
        return "Hello 👋 Main Shardex AI hoon!";
    if(msg.includes("help"))
        return "Main choti moti help kar sakta hoon 😎";
    if(msg.includes("owner"))
        return "Mera owner Shardex hai 🔥";
    if(msg.includes("time"))
        return "Abhi time hai: " + new Date().toLocaleTimeString();
    return "Interesting 🤔 Aur batao?";
}

document.getElementById("input")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
