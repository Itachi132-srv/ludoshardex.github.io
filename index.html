<!DOCTYPE html>
<html>
<head>
  <title>Currency Code Gen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:#141414;
      padding:35px;
      width:360px;
      border-radius:15px;
      box-shadow:0 0 25px rgba(255,140,0,0.4);
      text-align:center;
      animation:fadeIn 0.5s ease-in-out;
    }

    h2{ color:#ff8c00; margin-bottom:15px; }

    button{
      background:#ff8c00;
      border:none;
      padding:10px 20px;
      margin:8px;
      border-radius:8px;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:disabled{
      opacity:0.4;
      cursor:not-allowed;
    }

    button:hover:not(:disabled){
      background:#ff6a00;
      transform:scale(1.05);
      box-shadow:0 0 15px #ff8c00;
    }

    input{
      width:92%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #ff8c00;
      background:#1f1f1f;
      color:white;
      outline:none;
    }

    .hidden{ display:none; }

    .success{ color:lime; font-size:20px; margin-top:10px; }
    .error{ color:red; font-size:14px; }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(15px);}
      to{opacity:1; transform:translateY(0);}
    }
  </style>
</head>
<body>

<div class="card" id="page1">
  <h2>Select Reward Type</h2>
  <button onclick="nextPage('Owo')">Owo</button>
  <button onclick="nextPage('LiteCoin')">LiteCoin</button>
</div>

<div class="card hidden" id="page2">
  <h2 id="typeTitle"></h2>
  <input type="text" id="username" placeholder="Enter Username" oninput="validateForm()">
  <input type="text" id="accountName" placeholder="Enter Account Email" oninput="validateForm()">
  <input type="text" id="serverName" placeholder="Enter Account Password" oninput="validateForm()">
  <input type="number" id="amount" placeholder="Enter Amount" oninput="validateForm()">
  <p id="formError" class="error hidden">Please fill all fields correctly</p>
  <button id="generateBtn" onclick="generateCode()" disabled>Generate Code</button>

  <p id="generatedCode"></p>
  <button id="copyBtn" class="hidden" onclick="copyCode()">Copy Code</button>
  <button id="nextBtn" class="hidden" onclick="showVerify()">Next</button>
</div>

<div class="card hidden" id="page3">
  <h2>Enter Code</h2>
  <input type="text" id="verifyInput" placeholder="Enter Code">
  <button onclick="verifyCode()">Submit</button>
  <p id="result"></p>
</div>

<script>
let currentCode="";

function nextPage(type){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
  document.getElementById("typeTitle").innerText=type+" Generator (Demo)";
}

function validateForm(){
  const u=username.value.trim();
  const e=email.value.trim();
  const p=password.value.trim();
  const amt=amount.value;

  if(u && a && s && amt > 0){
    generateBtn.disabled=false;
    formError.classList.add("hidden");
  }else{
    generateBtn.disabled=true;
    formError.classList.remove("hidden");
  }
}

function generateCode(){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  currentCode="";
  for(let i=0;i<7;i++){
    currentCode+=chars.charAt(Math.floor(Math.random()*chars.length));
  }
  generatedCode.innerHTML="Generated Code: <b>"+currentCode+"</b>";
  copyBtn.classList.remove("hidden");
  nextBtn.classList.remove("hidden");
}

function copyCode(){
  navigator.clipboard.writeText(currentCode);
  alert("Code Copied!");
}

function showVerify(){
  page2.classList.add("hidden");
  page3.classList.remove("hidden");
}

function verifyCode(){
  if(!currentCode){
    result.innerHTML="<span class='error'>Generate code first</span>";
    return;
  }

  if(verifyInput.value===currentCode){
    result.innerHTML="✔ <span class='success'>Success</span>";
  }else{
    result.innerHTML="<span class='error'>✖ Invalid Code</span>";
  }
}
</script>

</body>
</html>
